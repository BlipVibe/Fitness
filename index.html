<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FitTrack</title>
  <script>
    // If keys exist → login, otherwise → setup
    const keys = JSON.parse(localStorage.getItem('fittrack_keys') || '{}');
    if (keys.SUPABASE_URL && keys.SUPABASE_ANON_KEY) {
      window.location.replace('login.html');
    } else {
      window.location.replace('setup.html');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
